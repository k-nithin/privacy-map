# AI PBOM Scan Configuration
# Adjust data sources, sampling, and detector settings for your environment.

data_sources:
  # Postgres connector — structured tables
  - type: postgres
    connection:
      host: localhost
      port: 5432
      database: myapp
      user: postgres
      password: postgres
    schemas:
      - public

  # pgvector connector — vector embedding tables
  - type: pgvector
    connection:
      host: localhost
      port: 5432
      database: myapp
      user: postgres
      password: postgres
    schemas:
      - public

  # Filesystem connector — local files
  - type: filesystem
    paths:
      - ./data/prompt_logs
      - ./data/training
      - ./data/documents
    include_patterns:
      - "*.json"
      - "*.jsonl"
      - "*.txt"
      - "*.csv"
      - "*.md"
    exclude_patterns:
      - "*.tmp"
      - ".*"

# Sampling limits
sampling:
  max_rows_per_table: 100
  max_files_per_directory: 50
  max_text_chars: 10000

# Detectors to enable
detectors:
  pii: true
  secrets: true
  sensitivity: true

# Output directory
output_dir: output/
